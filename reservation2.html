<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Restaurant reservation confirmation page with accessible and responsive XHTML 1.0 Strict design." />
  <meta name="keywords" content="reservation, booking, restaurant, table booking" />
  <meta name="author" content="Your Name" />
  <title>Reservation Details</title>
  <link rel="stylesheet" type="text/css" href="styles.css" />
</head>

<body>

<div id="container">

  <h1>Reservation Details</h1>

  <div class="reservation-card">

    <h2>Confirm Your Booking</h2>

    <p><strong>Date:</strong> <span>July 20, 2022</span></p>
    <p><strong>Time:</strong> <span>7:00 PM</span></p>
    <p><strong>Guests:</strong> <span>4 People</span></p>

    <div class="buttons">
      <form action="#" method="post">
        <div>
          <input type="submit" name="back" value="Back" class="button secondary" />
          <input type="submit" name="book" value="Book Table" class="button primary" />
        </div>
      </form>
    </div>

  </div>

  <div class="media-section">

    <img src="restaurant.jpg" alt="Restaurant interior with reserved table setup" width="600" height="400" />

    <!-- Audio and video elements XHTML 1.0 Strict-д HTML5 controls байхгүй -->
    <object data="background-music.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </object>

    <object data="restaurant-video.mp4" type="video/mp4" width="600" height="400">
      Your browser does not support the video element.
    </object>

  </div>

</div>

</body>
</html>
